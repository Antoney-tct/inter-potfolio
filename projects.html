<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects · Antoney Ouko</title>
    <link rel="stylesheet" href="https://use.typekit.net/xqr0xuo.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">antoney ouko</a>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-close-btn" id="navClose"><i class="fas fa-times"></i></li>
                <li><a href="index.html#home">studio</a></li>
                <li><a href="index.html#skills">craft</a></li>
                <li><a href="projects.html" style="color: var(--terracotta);">Projects</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="index.html#contact">connect</a></li>
                <li><a href="index.html#contact" class="btn-hire-me">Hire Me</a></li>
                <li><button class="theme-toggle-btn" id="themeToggle"><i class="fas fa-moon"></i></button></li>
            </ul>
        </div>
    </header>

    <section style="padding-top: 150px;">
        <div class="container">
            <h1 style="margin-bottom: 20px;">all projects</h1>
            <p style="max-width: 600px; margin-bottom: 60px;">A complete archive of my work in web development, design, and quality assurance.</p>
            
            <div class="work-grid" id="all-projects-grid">
                <!-- Projects will be injected here -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>© 2026 antoney ouko — made with ◈ in nairobi</p>
            </div>
        </div>
    </footer>

    <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

    <script src="data.js"></script>
    <script>
        const grid = document.getElementById('all-projects-grid');
        
        // Loop through all projects in data.js and create cards
        for (const [id, project] of Object.entries(projectData)) {
            const card = document.createElement('a');
            card.href = `project.html?id=${id}`;
            card.className = 'work-card-link';
            
            // Create tags HTML
            const tagsHtml = project.technologies.slice(0, 3).map(t => 
                `<span class="work-tag">${t}</span>`
            ).join('');

            card.innerHTML = `
                <div class="work-card">
                    <img src="${project.image}" alt="${project.title}" class="work-card-image" style="width:100%; height:240px; object-fit:cover;">
                    <div class="work-content">
                        <span class="work-category">${project.category}</span>
                        <h3 style="margin-bottom: 10px;">${project.title}</h3>
                        <p style="font-size: 0.95rem;">${project.description.substring(0, 80)}...</p>
                        <div class="work-tags">
                            ${tagsHtml}
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        // Mobile menu logic
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        const navClose = document.getElementById('navClose');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                menuToggle.classList.toggle('active');
            });
        }

        if (navClose) {
            navClose.addEventListener('click', () => {
                navMenu.classList.remove('active');
                menuToggle.classList.remove('active');
            });
        }

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');

        // Check local storage
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            icon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Back to Top
        const backToTop = document.getElementById('backToTop');
        if (backToTop) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });

            backToTop.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    </script>
</body>
</html>
