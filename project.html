<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details · Antoney Ouko</title>
    
    <!-- Reusing the same fonts and styles from index.html -->
    <link rel="stylesheet" href="https://use.typekit.net/xqr0xuo.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 
   
</head>
<body>
    <!-- Reused Header -->
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">antoney ouko</a>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-close-btn" id="navClose"><i class="fas fa-times"></i></li>
                <li><a href="index.html#home">studio</a></li>
                <li><a href="index.html#skills">craft</a></li>
                <li><a href="index.html#work">work</a></li>
                <li><a href="index.html#studio">process</a></li>
                <li><a href="index.html#contact">connect</a></li>
                <li><a href="index.html#contact" class="btn-hire-me">Hire Me</a></li>
                <li><button class="theme-toggle-btn" id="themeToggle"><i class="fas fa-moon"></i></button></li>
            </ul>
        </div>
    </header>

    <!-- Main Project Content -->
    <main>
        <section class="project-detail-section">
            <div class="container" id="project-container">
                <!-- This content will be dynamically generated by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Reused Footer -->
    <footer>
        <div class="container">
            <div class="copyright">
                <p>© 2026 antoney ouko — made with ◈ in nairobi</p>
            </div>
        </div>
    </footer>

    <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

    <!-- Load the data first -->
    <script src="data.js"></script>
    <script>
        // This script runs when the page loads
        window.onload = () => {
            const container = document.getElementById('project-container');
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id'); // Gets 'ecommerce', 'branding', etc. from the URL
            const project = projectData[projectId];

            if (project) {
                // If the project exists, build the HTML for it
                document.title = `${project.title} · Antoney Ouko`;

                let techHtml = project.technologies.map(tag => `<span class="work-tag">${tag}</span>`).join('');
                
                let linksHtml = '';
                if (project.liveLink && project.liveLink !== '#') {
                    linksHtml += `<a href="${project.liveLink}" class="download-link" target="_blank" rel="noopener noreferrer">View Live Project</a><br>`;
                }
                if (project.githubLink && project.githubLink !== '#') {
                    linksHtml += `<a href="${project.githubLink}" class="download-link" target="_blank" rel="noopener noreferrer">View on GitHub</a>`;
                }

                container.innerHTML = `
                    <div class="project-header">
                        <span class="work-category">${project.category}</span>
                        <h1 class="project-title-large">${project.title}</h1>
                    </div>

                    <img src="${project.image}" alt="${project.title}" class="project-main-image">

                    <div class="project-body-grid">
                        <div class="project-description-block">
                            <h2>About the Project</h2>
                            <p>${project.description}</p>
                        </div>
                        <div class="project-meta-block">
                            <h3>Technologies Used</h3>
                            <div class="work-tags" style="margin-bottom: 30px;">
                                ${techHtml}
                            </div>
                            
                            ${linksHtml ? `<h3>Links</h3><div class="project-links">${linksHtml}</div>` : ''}

                            <a href="index.html#work" class="btn btn-secondary" style="margin-top: 30px; display: inline-flex; align-items: center; gap: 10px;">
                                <i class="fas fa-arrow-left"></i> Back to All Work
                            </a>
                        </div>
                    </div>
                `;
            } else {
                // If the project ID in the URL is invalid, show an error
                container.innerHTML = `
                    <div class="project-header">
                        <h1 class="project-title-large">Project Not Found</h1>
                        <p>The project you are looking for does not exist.</p>
                        <a href="index.html#work" class="btn btn-primary" style="margin-top: 30px;">
                            <i class="fas fa-arrow-left"></i> Back to All Work
                        </a>
                    </div>
                `;
            }

            // Mobile menu logic
            const menuToggle = document.getElementById('menuToggle');
            const navMenu = document.getElementById('navMenu');
            const navClose = document.getElementById('navClose');

            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                    menuToggle.classList.toggle('active');
                });
            }

            if (navClose) {
                navClose.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                    menuToggle.classList.remove('active');
                });
            }

            // Theme Toggle
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeToggle.querySelector('i');

            // Check local storage
            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const isDark = body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });

            // Back to Top
            const backToTop = document.getElementById('backToTop');
            if (backToTop) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) {
                        backToTop.classList.add('visible');
                    } else {
                        backToTop.classList.remove('visible');
                    }
                });

                backToTop.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        };
    </script>

</body>
</html>
