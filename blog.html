    <section style="padding-top: 150px;">

            <h1 style="margin-bottom: 20px;">from the general industry journals</h1>

    <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

    <script src="main.js" defer></script>
    <script src="blog-data.js"></script>
    <script>
        const grid = document.getElementById('blog-grid');
        
        // Loop through all my blog posts and create cards
        for (const [id, post] of Object.entries(blogPosts)) {
            const card = document.createElement('a');
            card.href = `post.html?id=${id}`;
            card.className = 'post-card-link';

            card.innerHTML = `
                <div class="post-card">
                    <img src="${post.image}" alt="${post.title}" class="post-image">
                    <div class="post-content">
                        <span class="post-meta">${post.date} · ${post.author}</span>
                        <h3 class="post-title">${post.title}</h3>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <span class="post-read-more">Read More <i class="fas fa-arrow-right"></i></span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }
    </script>
</body>
