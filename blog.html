<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog · Antoney Ouko</title>
    <link rel="stylesheet" href="https://use.typekit.net/xqr0xuo.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo">antoney ouko</a>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-close-btn" id="navClose"><i class="fas fa-times"></i></li>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#skills">craft</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="about.html">My story</a></li>
                <li><a href="blog.html" style="color: var(--terracotta);">Blog</a></li>
                <li><a href="index.html#contact">connect</a></li>
                <li><a href="index.html#contact" class="btn-hire-me">Hire Me</a></li>
                <li><button class="theme-toggle-btn" id="themeToggle"><i class="fas fa-moon"></i></button></li>
            </ul>
        </div>
    </header>

    <section style="padding-top: 150px;">
        <div class="container">
            <h1 style="margin-bottom: 20px;">from the journal</h1>
            <p style="max-width: 600px; margin-bottom: 60px;">Thoughts on technology, design, and the human side of digital craftsmanship.</p>
            
            <div class="blog-grid" id="blog-grid">
                <!-- Blog posts will be injected here -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="copyright">
                <p>© <span id="copyright-year">2024</span> antoney ouko — made with ◈ in nairobi</p>
            </div>
        </div>
    </footer>

    <a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

    <script src="blog-data.js"></script>
    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        
        const grid = document.getElementById('blog-grid');
        
        // Loop through all posts in blog-data.js and create cards
        for (const [id, post] of Object.entries(blogPosts)) {
            const card = document.createElement('a');
            card.href = `post.html?id=${id}`;
            card.className = 'post-card-link';

            card.innerHTML = `
                <div class="post-card">
                    <img src="${post.image}" alt="${post.title}" class="post-image">
                    <div class="post-content">
                        <span class="post-meta">${post.date} · ${post.author}</span>
                        <h3 class="post-title">${post.title}</h3>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <span class="post-read-more">Read More <i class="fas fa-arrow-right"></i></span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        // Shared JS for menu, theme, back-to-top
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        const navClose = document.getElementById('navClose');
        if (menuToggle) { menuToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); menuToggle.classList.toggle('active'); }); }
        if (navClose) { navClose.addEventListener('click', () => { navMenu.classList.remove('active'); menuToggle.classList.remove('active'); }); }

        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const icon = themeToggle.querySelector('i');
        if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark-mode'); icon.classList.replace('fa-moon', 'fa-sun'); }
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        });

        const backToTop = document.getElementById('backToTop');
        if (backToTop) {
            window.addEventListener('scroll', () => { window.scrollY > 300 ? backToTop.classList.add('visible') : backToTop.classList.remove('visible'); });
            backToTop.addEventListener('click', (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
        }
    </script>
</body>
</html>
